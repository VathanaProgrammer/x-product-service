server:
  port: ${PRODUCT_SERVICE_PORT:8082}

spring:
  banner:
    location: classpath:banner.txt
    mode: console
  application:
    name: x-product-service
  profiles:
    default: local
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# Shared cache settings from com.x:x-redis
x:
  http:
    logging:
      enabled: true
      server: x-product-service
      hop: "x-api-gateway → x-bff → x-product-service"
      hops:
        /api/v1/products: "x-api-gateway → x-bff → x-product-service"
  redis:
    enabled: ${X_REDIS_ENABLED:true}
    key-prefix: x
    default-ttl: 10m
    caches:
      product-by-id: 15m
      products: 5m

jwt:
  secret: ${JWT_SECRET:x-local-jwt-secret-change-me-32chars}
  expiration: ${JWT_EXPIRATION:86400000}
