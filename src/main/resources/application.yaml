server:
  port: ${PRODUCT_SERVICE_PORT:8082}

spring:
  application:
    name: X-Product-Service
  profiles:
    default: local
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# Shared cache settings from com.vyntra:x-redis
vyntra:
  redis:
    enabled: ${X_REDIS_ENABLED:true}
    key-prefix: x
    default-ttl: 10m
    caches:
      product-by-id: 15m
      products: 5m

jwt:
  # Must match BFF for token validation. Local default for IntelliJ / ./x.sh.
  secret: ${JWT_SECRET:vyntra-local-jwt-secret-change-me-32c}
  expiration: ${JWT_EXPIRATION:86400000}
